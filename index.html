<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipeMusic</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <h1 id="logo">PipeMusic</h1>
        <div class="nav-buttons">
            <button id="random-mode-btn" class="btn"><i class="fas fa-shuffle"></i> Слушать рандом</button>
            <button id="search-toggle-btn" class="btn-icon"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div id="search-bar" class="search-bar hidden">
        <input type="text" id="search-input" placeholder="Поиск треков или альбомов...">
        <div id="search-results" class="search-results"></div>
    </div>

    <main id="main-content">
        <section id="albums-grid" class="albums-grid"></section>
        
        <section id="album-view" class="album-view hidden">
            <button id="back-btn" class="btn-back"><i class="fas fa-arrow-left"></i> Назад</button>
            <div class="album-header">
                <img id="album-cover" src="" alt="Обложка">
                <div class="album-info">
                    <h2 id="album-title"></h2>
                    <p id="album-desc" class="album-desc"></p>
                </div>
            </div>
            <ul id="track-list" class="track-list"></ul>
        </section>
    </main>

    <footer id="audio-player" class="audio-player">
        <div class="player-track-info">
            <img id="player-cover" src="https://via.placeholder.com/50" alt="">
            <div>
                <div id="player-title">Выберите трек</div>
                <div id="player-album">Альбом</div>
            </div>
        </div>
        
        <div class="player-controls">
            <button id="prev-btn" class="control-btn"><i class="fas fa-step-backward"></i></button>
            <button id="play-btn" class="control-btn play-main"><i class="fas fa-play"></i></button>
            <button id="next-btn" class="control-btn"><i class="fas fa-step-forward"></i></button>
            <audio id="main-audio"></audio>
        </div>

        <div class="player-progress">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" max="100">
            <span id="total-time">0:00</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
