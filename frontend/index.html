<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicStream - Listen to your favorite tracks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎵 MusicStream</h1>
      <p>Your personal music streaming service</p>
    </header>

    <div class="player-container">
      <div class="currently-playing">
        <div class="album-art">🎧</div>
        <div class="track-info">
          <h3 id="current-track">No track selected</h3>
          <p id="track-status">Ready to play</p>
        </div>
      </div>

      <div class="controls">
        <button id="prev-btn" class="control-btn">⏮️</button>
        <button id="play-pause-btn" class="control-btn play">▶️</button>
        <button id="next-btn" class="control-btn">⏭️</button>
      </div>

      <div class="progress-container">
        <span id="current-time">0:00</span>
        <input type="range" id="progress-bar" value="0" step="0.01">
        <span id="duration">0:00</span>
      </div>

      <div class="volume-control">
        <span>🔊</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
      </div>
    </div>

    <div class="playlist">
      <h2>Your Library</h2>
      <ul id="track-list"></ul>
    </div>
  </div>

  <audio id="audio-player"></audio>
  <script src="script.js"></script>
</body>
</html>
